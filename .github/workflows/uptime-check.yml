name: Uptime check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

env:
  TARGET_URL: https://usw-festival.site/

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: Get previous run conclusion
        id: prev
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV=$(gh run list \
            --workflow "${{ github.workflow }}" \
            --repo "${{ github.repository }}" \
            --status completed \
            --limit 1 \
            --json conclusion \
            --jq '.[0].conclusion // "none"')
          echo "previous=$PREV" >> "$GITHUB_OUTPUT"
          echo "Previous run conclusion: $PREV"

      - name: Check site (3 attempts, 10s timeout each)
        id: check
        run: |
          HTTP_CODE="000"
          for i in 1 2 3; do
            HTTP_CODE=$(curl -sSL --max-time 10 -o /dev/null -w "%{http_code}" "$TARGET_URL" || echo "000")
            if [[ "$HTTP_CODE" =~ ^2 ]]; then
              echo "Site up (attempt $i, HTTP $HTTP_CODE)"
              echo "code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $i failed (HTTP $HTTP_CODE)"
            [ $i -lt 3 ] && sleep 10
          done
          echo "code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Notify Discord — site DOWN (state change)
        if: failure() && steps.prev.outputs.previous != 'failure'
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CODE: ${{ steps.check.outputs.code }}
        run: |
          jq -n \
            --arg url "$TARGET_URL" \
            --arg code "$CODE" \
            --arg run "$RUN_URL" \
            '{
              username: "Uptime Monitor",
              content: ":rotating_light: **\($url) is DOWN**\nLast HTTP: `\($code)`\n<\($run)>"
            }' | curl -fsS -X POST -H "Content-Type: application/json" -d @- "$WEBHOOK"

      - name: Notify Discord — site RECOVERED (state change)
        if: success() && steps.prev.outputs.previous == 'failure'
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          jq -n \
            --arg url "$TARGET_URL" \
            --arg run "$RUN_URL" \
            '{
              username: "Uptime Monitor",
              content: ":white_check_mark: **\($url) RECOVERED**\n<\($run)>"
            }' | curl -fsS -X POST -H "Content-Type: application/json" -d @- "$WEBHOOK"

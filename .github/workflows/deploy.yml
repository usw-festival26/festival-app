name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        # build:web 스크립트: expo export 후 dist/assets/node_modules → dist/assets/_node 로 rename.
        # Cloudflare Pages 가 node_modules 디렉터리를 자동 제외해 아이콘/폰트 TTF가 404 나는 것을 우회한다.
        run: npm run build:web
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.API_BASE_URL }}

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=uswfestival26 --branch=${{ github.head_ref || github.ref_name }}
